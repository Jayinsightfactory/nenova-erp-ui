name: Deploy to Cafe24

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy to Cafe24
        uses: appleboy/ssh-action@v1.0.3
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AUTOMATION_API_TOKEN: ${{ secrets.AUTOMATION_API_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          KAKAO_SHEET_ID: ${{ secrets.KAKAO_SHEET_ID }}
        with:
          host: 172.233.89.171
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          envs: ANTHROPIC_API_KEY,AUTOMATION_API_TOKEN,GOOGLE_SERVICE_ACCOUNT_JSON,KAKAO_SHEET_ID
          script: |
            export PATH=$PATH:/root/.nvm/versions/node/$(ls /root/.nvm/versions/node/ 2>/dev/null | tail -1)/bin:/usr/local/bin
            cd /var/www/nenova-erp
            echo "=== git pull ==="
            git remote set-url origin https://github.com/Jayinsightfactory/nenova-erp-ui.git
            git fetch origin master
            git reset --hard origin/master
            echo "=== .env.local 환경변수 동기화 (ANTHROPIC_API_KEY) ==="
            if [ -n "$ANTHROPIC_API_KEY" ]; then
              if grep -q '^ANTHROPIC_API_KEY=' .env.local 2>/dev/null; then
                # BSD/GNU sed 호환: 임시 파일 방식
                grep -v '^ANTHROPIC_API_KEY=' .env.local > .env.local.tmp || true
                mv .env.local.tmp .env.local
              fi
              echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> .env.local
              echo "✅ ANTHROPIC_API_KEY synced (len=${#ANTHROPIC_API_KEY})"
            else
              echo "⚠️  ANTHROPIC_API_KEY GitHub Secret 이 비어있음 — 챗봇 LLM 비활성"
            fi
            echo "=== .env.local 환경변수 동기화 (AUTOMATION_API_TOKEN) ==="
            if [ -n "$AUTOMATION_API_TOKEN" ]; then
              if grep -q '^AUTOMATION_API_TOKEN=' .env.local 2>/dev/null; then
                grep -v '^AUTOMATION_API_TOKEN=' .env.local > .env.local.tmp || true
                mv .env.local.tmp .env.local
              fi
              echo "AUTOMATION_API_TOKEN=$AUTOMATION_API_TOKEN" >> .env.local
              echo "✅ AUTOMATION_API_TOKEN synced (len=${#AUTOMATION_API_TOKEN})"
            else
              echo "ℹ️  AUTOMATION_API_TOKEN GitHub Secret 미설정 — n8n 브리지 API 비활성(503)"
            fi
            echo "=== .env.local 환경변수 동기화 (GOOGLE_SERVICE_ACCOUNT_JSON) ==="
            if [ -n "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
              if grep -q '^GOOGLE_SERVICE_ACCOUNT_JSON=' .env.local 2>/dev/null; then
                grep -v '^GOOGLE_SERVICE_ACCOUNT_JSON=' .env.local > .env.local.tmp || true
                mv .env.local.tmp .env.local
              fi
              echo "GOOGLE_SERVICE_ACCOUNT_JSON=$GOOGLE_SERVICE_ACCOUNT_JSON" >> .env.local
              echo "✅ GOOGLE_SERVICE_ACCOUNT_JSON synced (len=${#GOOGLE_SERVICE_ACCOUNT_JSON})"
            else
              echo "ℹ️  GOOGLE_SERVICE_ACCOUNT_JSON GitHub Secret 미설정 — 카카오 시트 연동 비활성"
            fi
            echo "=== .env.local 환경변수 동기화 (KAKAO_SHEET_ID) ==="
            if [ -n "$KAKAO_SHEET_ID" ]; then
              if grep -q '^KAKAO_SHEET_ID=' .env.local 2>/dev/null; then
                grep -v '^KAKAO_SHEET_ID=' .env.local > .env.local.tmp || true
                mv .env.local.tmp .env.local
              fi
              echo "KAKAO_SHEET_ID=$KAKAO_SHEET_ID" >> .env.local
              echo "✅ KAKAO_SHEET_ID synced"
            else
              echo "ℹ️  KAKAO_SHEET_ID 미설정 — 기본 시트ID 사용"
            fi
            echo "=== npm install ==="
            npm install --omit=dev
            echo "=== build ==="
            rm -rf .next
            if ! npm run build 2>&1; then echo "❌ 빌드 실패 — pm2 재시작 건너뜀"; pm2 logs nenova-erp --nostream --lines 5 2>&1; exit 1; fi
            if [ ! -d ".next/server" ]; then echo "❌ .next/server 누락 — 빌드 산출물 없음"; exit 1; fi
            echo "=== pm2 restart ==="
            pm2 restart nenova-erp
            echo "✅ 배포 완료"
