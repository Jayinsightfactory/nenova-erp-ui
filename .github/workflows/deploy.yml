name: Deploy to Cafe24

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy to Cafe24
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 172.233.89.171
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd /var/www/nenova-erp-ui
            git remote set-url origin https://github.com/Jayinsightfactory/nenova-erp-ui.git
            git fetch origin master
            git reset --hard origin/master
            npm install --omit=dev
            rm -rf .next
            npm run build
            pm2 restart nenova-erp
            echo "✅ 배포 완료"
