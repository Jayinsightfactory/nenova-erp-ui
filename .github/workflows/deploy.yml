name: Deploy to Cafe24

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy to Cafe24
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 172.233.89.171
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            echo "=== 경로 탐색 ==="
            find /root /home /var/www /srv -maxdepth 4 -name "package.json" -not -path "*/node_modules/*" 2>/dev/null | xargs grep -l '"nenova-erp-ui"' 2>/dev/null | head -5
            echo "=== pm2 목록 ==="
            export PATH=$PATH:/root/.nvm/versions/node/$(ls /root/.nvm/versions/node/ 2>/dev/null | tail -1)/bin:/usr/local/bin
            pm2 list 2>/dev/null || echo "pm2 명령 실패"
