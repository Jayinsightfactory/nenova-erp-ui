# /etc/nginx/conf.d/n8n-subdomain.conf
# n8n 서브도메인용 nginx 블록(포트 80). certbot --nginx 가 이 블록을 인식해
# 인증서 발급 + 443 블록/HTTPS 리다이렉트를 자동 추가한다.
# n8n은 127.0.0.1:5678 에서만 수신 → nginx 가 HTTPS로 노출.

server {
    listen 80;
    listen [::]:80;
    server_name n8n.nenovaweb.com;

    # 업로드/대용량 워크플로우 대비
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:5678;
        proxy_http_version 1.1;

        # WebSocket(에디터 실시간 push) 필수
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
