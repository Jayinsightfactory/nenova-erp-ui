# nginx — nenovaweb.com 443 server 블록 "안에" 아래 location 두 개를 추가하고 reload.
# (기존 `location / { proxy_pass http://127.0.0.1:3000; }` 위쪽/같은 블록 내에 둔다.)
# `^~` 접두 매칭이라 Next.js 캐치올(location /)보다 우선한다.

# /n8n → /n8n/ 로 정규화
location = /n8n {
    return 301 /n8n/;
}

location ^~ /n8n/ {
    proxy_pass http://127.0.0.1:5678;     # 끝 슬래시 없음 → /n8n/ 경로 그대로 전달(N8N_PATH=/n8n/ 와 일치)
    proxy_http_version 1.1;

    # WebSocket(에디터 실시간 push) 필수
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_buffering off;
    chunked_transfer_encoding off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # (선택) 직원 외 차단용 추가 게이트가 필요하면 아래 두 줄 주석 해제 후 htpasswd 생성
    # auth_basic "n8n";
    # auth_basic_user_file /etc/nginx/.htpasswd_n8n;
}
